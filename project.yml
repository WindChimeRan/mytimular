name: TimeularMacropad
options:
  bundleIdPrefix: com.timeular
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  TimeularMacropad:
    type: application
    platform: macOS
    sources:
      - TimeularMacropad
    settings:
      base:
        INFOPLIST_FILE: TimeularMacropad/Info.plist
        CODE_SIGN_ENTITLEMENTS: TimeularMacropad/TimeularMacropad.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.timeular.macropad
        PRODUCT_NAME: Timeular Macropad
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
